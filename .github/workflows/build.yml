name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-33" "build-tools;33.0.0" "ndk;25.2.9519653" "cmake;3.22.1"
      - run: |
          sed -i '/com.google.gms/d' TMessagesProj/build.gradle
          sed -i '/com.google.firebase/d' TMessagesProj/build.gradle
          sed -i '/com.android.billingclient/d' TMessagesProj/build.gradle
          echo "org.telegram.messenger.api_id=${{ secrets.API_ID }}" >> gradle.properties
          echo "org.telegram.messenger.api_hash=${{ secrets.API_HASH }}" >> gradle.properties
          echo "TMessagesProj.mapsKey=" >> gradle.properties
          echo "TMessagesProj.billingKey=" >> gradle.properties
      - run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: "**/build/outputs/apk/**/*.apk"
